<!DOCTYPE html>
<html>
<head>
    <title>Live Link Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; background: #f4f4f9; color: #333; }
        #map { height: 65vh; width: 100%; margin-top: 10px; border-top: 3px solid #ccc; }
        .panel { padding: 20px; background: white; margin: 15px auto; width: 90%; max-width: 500px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { padding: 12px 20px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #27ae60; }
        input { padding: 10px; width: 85%; margin-top: 10px; text-align: center; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; background: #eee; }
        h2 { margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2>📍 Live Location Sharer</h2>
    <div class="panel" id="ui-panel">
        <p id="status" style="font-weight: bold; color: #555;">Loading app...</p>
        <div id="controls"></div>
    </div>

    <div id="map"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        // PASTE YOUR FIREBASE CONFIG HERE:
        const firebaseConfig = {
  apiKey: "AIzaSyAQJgJN-zhFVLfHmb_nchilnl7P7EO_mxQ",
  authDomain: "device-tracker-f43d5.firebaseapp.com",
  databaseURL: "https://device-tracker-f43d5-default-rtdb.firebaseio.com",
  projectId: "device-tracker-f43d5",
  storageBucket: "device-tracker-f43d5.firebasestorage.app",
  messagingSenderId: "153076156970",
  appId: "1:153076156970:web:d2eeb8e66ddfd4f9f61153",
  measurementId: "G-EZHG4JEKT8"
};
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Setup Map
        const map = L.map('map').setView([18.5204, 73.8567], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const markers = {};

        // Check if we are joining a room via a link
        const urlParams = new URLSearchParams(window.location.search);
        const roomID = urlParams.get('room');
        
        // Give this specific device a random ID so we don't overwrite each other
        const myDeviceID = "Device_" + Math.floor(Math.random() * 10000);

        const statusEl = document.getElementById('status');
        const controlsEl = document.getElementById('controls');

        // APP LOGIC
        if (!roomID) {
            // MODE 1: Create a tracking link
            statusEl.innerText = "Create a secure room to track with someone.";
            const btn = document.createElement('button');
            btn.innerText = "🔗 Generate Tracking Link";
            btn.onclick = () => {
                // Create a random 6-letter room code
                const newRoom = Math.random().toString(36).substring(2, 8);
                const shareLink = window.location.href.split('?')[0] + "?room=" + newRoom;
                
                controlsEl.innerHTML = `
                    <p>Copy and send this exact link to whoever you want to track:</p>
                    <input type="text" value="${shareLink}" readonly onclick="this.select()">
                    <button onclick="startTracking('${newRoom}')">📡 Start My Radar</button>
                `;
            };
            controlsEl.appendChild(btn);
        } else {
            // MODE 2: Join an existing link
            statusEl.innerText = "You have been invited to share your live location!";
            const btn = document.createElement('button');
            btn.innerText = "📍 Tap to Connect & Share";
            btn.onclick = () => {
                btn.style.display = 'none';
                startTracking(roomID);
            };
            controlsEl.appendChild(btn);
        }

        // The Tracking Engine
        window.startTracking = function(room) {
            if (navigator.geolocation) {
                statusEl.innerText = "Locating GPS (this can take up to 10 seconds)...";
                
                // Start pulling location
                navigator.geolocation.watchPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // Push my location to Firebase into this specific room!
                    const myRef = ref(db, `rooms/${room}/${myDeviceID}`);
                    set(myRef, { lat: lat, lon: lon });
                    
                    // Auto-delete my pin if I close the web tab!
                    onDisconnect(myRef).remove();

                    statusEl.innerText = "✅ Live tracking active! Watching map...";
                }, (err) => {
                    statusEl.innerText = "❌ Error: Please allow location access in your browser.";
                }, { enableHighAccuracy: true });

                // Start watching Firebase for ANYONE else in this room
                onValue(ref(db, `rooms/${room}`), (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        for (const [device, coords] of Object.entries(data)) {
                            // If they already have a pin, remove it
                            if (markers[device]) map.removeLayer(markers[device]);
                            
                            // Draw their new pin
                            const isMe = (device === myDeviceID);
                            markers[device] = L.marker([coords.lat, coords.lon]).addTo(map)
                                .bindPopup(isMe ? "<b>You</b>" : "<b>Target Detected</b>")
                                .openPopup();
                        }
                    }
                });
            }
        };
    </script>
</body>
</html>
