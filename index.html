<!DOCTYPE html>
<html>
<head>
    <title>Stealth Radar Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; background: #2c3e50; color: white; }
        #map { height: 70vh; width: 100%; display: none; margin-top: 15px; border-top: 4px solid #34495e; }
        .panel { padding: 25px; background: #34495e; margin: 20px auto; width: 90%; max-width: 500px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        button { padding: 15px 20px; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; margin-top: 10px; }
        #generateBtn { background: #3498db; }
        #shareBtn { background: #e74c3c; }
        input { padding: 15px; width: 85%; margin-top: 15px; text-align: center; font-size: 14px; border-radius: 6px; border: none; background: #ecf0f1; color: #333; }
        #status-text { color: #f1c40f; font-weight: bold; margin-top: 20px; font-size: 16px; }
        .diagnostic { font-size: 12px; color: #bdc3c7; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <h2>📡 Stealth Radar Pro</h2>
    <div class="panel" id="ui-panel">
        <div id="controls"></div>
        <p id="status-text">System Ready.</p>
        <p class="diagnostic" id="debug-log">Log: Waiting to start...</p>
    </div>
    <div id="map"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        // PASTE YOUR FIREBASE CONFIG HERE:
        const firebaseConfig = {
  apiKey: "AIzaSyAQJgJN-zhFVLfHmb_nchilnl7P7EO_mxQ",
  authDomain: "device-tracker-f43d5.firebaseapp.com",
  databaseURL: "https://device-tracker-f43d5-default-rtdb.firebaseio.com",
  projectId: "device-tracker-f43d5",
  storageBucket: "device-tracker-f43d5.firebasestorage.app",
  messagingSenderId: "153076156970",
  appId: "1:153076156970:web:d2eeb8e66ddfd4f9f61153",
  measurementId: "G-EZHG4JEKT8"
};
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const urlParams = new URLSearchParams(window.location.search);
        const targetRoom = urlParams.get('target');
        
        const controls = document.getElementById('controls');
        const statusText = document.getElementById('status-text');
        const debugLog = document.getElementById('debug-log');
        const mapDiv = document.getElementById('map');
        
        let map, targetMarker;

        if (!targetRoom) {
            // ==========================================
            // MODE 1: RADAR (Your Laptop)
            // ==========================================
            controls.innerHTML = `
                <button id="generateBtn">🔗 Generate Tracking Link</button>
                <div id="linkContainer" style="display:none;">
                    <input type="text" id="shareLink" readonly onclick="this.select()">
                </div>
            `;
            
            document.getElementById('generateBtn').onclick = () => {
                const roomCode = Math.random().toString(36).substring(2, 8);
                const link = window.location.href.split('?')[0] + "?target=" + roomCode;
                
                document.getElementById('shareLink').value = link;
                document.getElementById('linkContainer').style.display = 'block';
                document.getElementById('generateBtn').style.display = 'none';
                
                navigator.clipboard.writeText(link).catch(e => console.log("Clipboard error"));
                
                statusText.innerText = "Waiting for Target to click link...";
                debugLog.innerText = `Log: Listening to Room [${roomCode}]`;
                
                mapDiv.style.display = 'block';
                map = L.map('map').setView([0, 0], 2);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                
                onValue(ref(db, 'tracking/' + roomCode), (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        statusText.innerText = "🚨 TARGET ACQUIRED! 🚨";
                        statusText.style.color = "#2ecc71";
                        debugLog.innerText = `Log: Data received! Lat: ${data.lat.toFixed(4)}, Lon: ${data.lon.toFixed(4)}`;
                        
                        if (targetMarker) map.removeLayer(targetMarker);
                        targetMarker = L.marker([data.lat, data.lon]).addTo(map).bindPopup("<b>Target</b>").openPopup();
                        map.setView([data.lat, data.lon], 16); 
                    }
                });
            };
        } else {
            // ==========================================
            // MODE 2: TARGET (Their Phone)
            // ==========================================
            controls.innerHTML = `<button id="shareBtn">📍 Share My Location</button>`;
            statusText.innerText = `You are joining secure room.`;
            debugLog.innerText = `Log: Room code [${targetRoom}]`;
            
            document.getElementById('shareBtn').onclick = () => {
                statusText.innerText = "Requesting GPS permissions...";
                debugLog.innerText = "Log: Waiting for user to click Allow...";
                document.getElementById('shareBtn').style.display = 'none';
                
                if (navigator.geolocation) {
                    navigator.geolocation.watchPosition((position) => {
                        debugLog.innerText = "Log: GPS coordinates captured! Sending to Firebase...";
                        
                        set(ref(db, 'tracking/' + targetRoom), { 
                            lat: position.coords.latitude, 
                            lon: position.coords.longitude 
                        }).then(() => {
                            statusText.innerText = "✅ Location is securely transmitting!";
                            statusText.style.color = "#2ecc71";
                            debugLog.innerText = "Log: Successfully uploaded to cloud.";
                        }).catch((error) => {
                            statusText.innerText = "❌ Database Error.";
                            debugLog.innerText = `Log Error: ${error.message}`;
                        });
                        
                    }, (error) => {
                        statusText.innerText = "❌ GPS Blocked or Failed.";
                        debugLog.innerText = `Log Error: ${error.message}`;
                    }, { enableHighAccuracy: true });
                } else {
                    statusText.innerText = "GPS not supported.";
                }
            };
        }
    </script>
</body>
</html>
