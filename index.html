<!DOCTYPE html>
<html>
<head>
    <title>Live Radar Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0a0a0a; color: #ecf0f1; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        /* Fullscreen Map Background */
        #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* Floating UI Panel (Mobile App Style) */
        .panel { 
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 85%; 
            max-width: 400px; 
            z-index: 1000;
            padding: 25px; 
            border-radius: 24px; 
            background: rgba(15, 20, 25, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 201, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
        }

        h2 { margin: 0 0 10px 0; font-size: 18px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: #00C9FF; }
        
        button { 
            padding: 16px; border: none; border-radius: 14px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        #generateBtn { background: linear-gradient(90deg, #00C9FF 0%, #0072ff 100%); color: white; box-shadow: 0 4px 15px rgba(0, 201, 255, 0.4); }
        #shareBtn { background: linear-gradient(90deg, #ff416c 0%, #ff4b2b 100%); color: white; box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4); }
        
        input { 
            padding: 14px; width: 85%; margin-top: 15px; text-align: center; font-size: 14px; border-radius: 10px; border: 1px solid rgba(0, 201, 255, 0.3); background: rgba(0, 0, 0, 0.6); color: #00C9FF; outline: none; 
        }
        
        #status-text { color: #00C9FF; font-weight: bold; margin-top: 15px; font-size: 14px; letter-spacing: 1px;}
        .diagnostic { font-size: 11px; color: rgba(255, 255, 255, 0.4); margin-top: 10px; font-family: monospace; }

        /* THE MAGIC: Animated Pulsing Radar Marker */
        .radar-blip {
            width: 18px; height: 18px; background-color: #00C9FF; border-radius: 50%; position: relative; box-shadow: 0 0 15px #00C9FF;
        }
        .radar-blip::after {
            content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px; border-radius: 50%; border: 2px solid #00C9FF; animation: pulse 1.5s ease-out infinite; opacity: 0;
        }
        @keyframes pulse {
            0% { transform: scale(0.3); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="panel" id="ui-panel">
        <h2>🛰️ Live Radar Pro</h2>
        <div id="controls"></div>
        <p id="status-text">System Initialization...</p>
        <p class="diagnostic" id="debug-log">Log: Standby</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        // PASTE YOUR FIREBASE CONFIG HERE:
        const firebaseConfig = {
  apiKey: "AIzaSyAQJgJN-zhFVLfHmb_nchilnl7P7EO_mxQ",
  authDomain: "device-tracker-f43d5.firebaseapp.com",
  databaseURL: "https://device-tracker-f43d5-default-rtdb.firebaseio.com",
  projectId: "device-tracker-f43d5",
  storageBucket: "device-tracker-f43d5.firebasestorage.app",
  messagingSenderId: "153076156970",
  appId: "1:153076156970:web:d2eeb8e66ddfd4f9f61153",
  measurementId: "G-EZHG4JEKT8"
};
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        const targetRoom = urlParams.get('target');
        
        const controls = document.getElementById('controls');
        const statusText = document.getElementById('status-text');
        const debugLog = document.getElementById('debug-log');
        
        // Render Dark Mode Cinematic Map Fullscreen
        const map = L.map('map', { zoomControl: false }).setView([18.5204, 73.8567], 3); // Defaults zoomed out
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© CARTO'
        }).addTo(map);

        let targetMarker, accuracyCircle;

        if (!targetRoom) {
            // MODE 1: RADAR COMMAND CENTER
            controls.innerHTML = `
                <button id="generateBtn">🔗 Generate Secure Link</button>
                <div id="linkContainer" style="display:none;">
                    <input type="text" id="shareLink" readonly onclick="this.select()">
                </div>
            `;
            
            document.getElementById('generateBtn').onclick = () => {
                const roomCode = Math.random().toString(36).substring(2, 8);
                const link = window.location.href.split('?')[0] + "?target=" + roomCode;
                
                document.getElementById('shareLink').value = link;
                document.getElementById('linkContainer').style.display = 'block';
                document.getElementById('generateBtn').style.display = 'none';
                
                navigator.clipboard.writeText(link).catch(e => console.log("Clipboard error"));
                
                statusText.innerText = "Waiting for Target Connection...";
                debugLog.innerText = `Log: Listening to channel [${roomCode}]`;
                
                onValue(ref(db, 'tracking/' + roomCode), (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        statusText.innerText = "🎯 TARGET ACQUIRED & TRACKING";
                        debugLog.innerText = `Acc: ±${Math.round(data.acc)} meters | Updated: live`;
                        
                        // Custom Glowing Blip
                        const glowingBlip = L.divIcon({
                            className: 'custom-icon',
                            html: "<div class='radar-blip'></div>",
                            iconSize: [18, 18],
                            iconAnchor: [9, 9]
                        });

                        // Draw or move the Marker & Accuracy Ring
                        if (targetMarker) {
                            targetMarker.setLatLng([data.lat, data.lon]);
                            accuracyCircle.setLatLng([data.lat, data.lon]);
                            accuracyCircle.setRadius(data.acc);
                        } else {
                            targetMarker = L.marker([data.lat, data.lon], {icon: glowingBlip}).addTo(map);
                            accuracyCircle = L.circle([data.lat, data.lon], {
                                color: '#00C9FF', fillColor: '#00C9FF', fillOpacity: 0.1, radius: data.acc
                            }).addTo(map);
                        }
                        
                        // Smooth Cinematic Pan
                        map.flyTo([data.lat, data.lon], 17, { animate: true, duration: 2.0 }); 
                    }
                });
            };
        } else {
            // MODE 2: THE TARGET PHONE
            controls.innerHTML = `<button id="shareBtn">📍 Broadcast Location</button>`;
            statusText.innerText = `Encrypted Channel Ready`;
            debugLog.innerText = `Log: Node [${targetRoom}]`;
            
            document.getElementById('shareBtn').onclick = () => {
                statusText.innerText = "Synchronizing GPS...";
                document.getElementById('shareBtn').style.display = 'none';
                
                if (navigator.geolocation) {
                    navigator.geolocation.watchPosition((position) => {
                        debugLog.innerText = "Log: Broadcasting live data...";
                        
                        set(ref(db, 'tracking/' + targetRoom), { 
                            lat: position.coords.latitude, 
                            lon: position.coords.longitude,
                            acc: position.coords.accuracy 
                        }).then(() => {
                            statusText.innerText = "🟢 TRANSMITTING LIVE";
                        }).catch((error) => {
                            statusText.innerText = "❌ Connection Dropped";
                        });
                        
                        // Show where they are on their own screen too
                        map.flyTo([position.coords.latitude, position.coords.longitude], 16, { animate: true });
                        
                    }, (error) => {
                        statusText.innerText = "❌ GPS Signal Lost";
                    }, { enableHighAccuracy: true });
                }
            };
        }
    </script>
</body>
</html>
