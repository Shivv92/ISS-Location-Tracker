<!DOCTYPE html>
<html lang="en">
<head>
    <title>Global Space Intelligence Radar</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; color: #ecf0f1; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; touch-action: none; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
        
        .radar-sweep { position: absolute; top: 50%; left: 50%; width: 150vmax; height: 150vmax; transform: translate(-50%, -50%); background: conic-gradient(from 0deg, transparent 70%, rgba(0, 201, 255, 0.1) 90%, rgba(0, 201, 255, 0.5) 100%); border-radius: 50%; pointer-events: none; z-index: 500; animation: sweep 4s linear infinite; display: none; }
        @keyframes sweep { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        .telemetry-panel { position: absolute; top: 20px; right: 20px; z-index: 1000; width: 200px; background: rgba(10, 15, 20, 0.85); border: 1px solid rgba(243, 156, 18, 0.4); border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.2); font-family: monospace; color: #00C9FF; display: none; backdrop-filter: blur(10px); }
        .telemetry-panel h3 { margin: 0 0 10px 0; color: #f39c12; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
        .data-row span:first-child { color: rgba(255,255,255,0.5); }
        .tel-val { font-weight: bold; }

        .panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; z-index: 1000; padding: 25px; border-radius: 24px; background: rgba(15, 20, 25, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(0, 201, 255, 0.3); box-shadow: 0 15px 35px rgba(0,0,0,0.8); text-align: center; }
        h2 { margin: 0 0 10px 0; font-size: 18px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: #00C9FF; }
        
        button { padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        #installBtn { display: none; background: linear-gradient(90deg, #f1c40f 0%, #e67e22 100%); color: #111; margin-bottom: 15px; }
        #generateBtn { background: linear-gradient(90deg, #00C9FF 0%, #0072ff 100%); color: white; }
        #shareBtn { background: linear-gradient(90deg, #ff416c 0%, #ff4b2b 100%); color: white; }
        
        .controls-row { display: flex; gap: 8px; margin-top: 10px; }
        .small-btn { background: rgba(255,255,255,0.1); color: #00C9FF; border: 1px solid rgba(0, 201, 255, 0.3); font-size: 12px; padding: 10px; flex: 1; }
        
        input { padding: 14px; width: 85%; margin-top: 10px; margin-bottom: 5px; text-align: center; font-size: 14px; border-radius: 10px; border: 1px solid rgba(0, 201, 255, 0.3); background: rgba(0, 0, 0, 0.6); color: #00C9FF; outline: none; }
        #status-text { color: #00C9FF; font-weight: bold; margin-top: 15px; font-size: 14px; letter-spacing: 1px;}
        .diagnostic { font-size: 11px; color: rgba(255, 255, 255, 0.4); margin-top: 10px; font-family: monospace; }
        
        .radar-blip { width: 18px; height: 18px; background-color: #00C9FF; border-radius: 50%; position: relative; box-shadow: 0 0 15px #00C9FF; }
        .radar-blip::after { content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px; border-radius: 50%; border: 2px solid #00C9FF; animation: pulse 1.5s ease-out infinite; opacity: 0; }
        @keyframes pulse { 0% { transform: scale(0.3); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .leaflet-tooltip.custom-tooltip { background: rgba(15, 20, 25, 0.9); border: 1px solid #00C9FF; color: #00C9FF; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="radar-sweep" id="radarSweep"></div>
    
    <div class="telemetry-panel" id="telemetryPanel">
        <h3>📡 Telemetry Uplink</h3>
        <div class="data-row"><span>SYS HEALTH:</span> <span class="tel-val" id="tel-status" style="color: #2ecc71;">STANDBY</span></div>
        <div class="data-row"><span>VELOCITY:</span> <span class="tel-val" id="tel-vel">--</span></div>
        <div class="data-row"><span>ALTITUDE:</span> <span class="tel-val" id="tel-alt">--</span></div>
        <div class="data-row"><span>LATITUDE:</span> <span class="tel-val" id="tel-lat">--</span></div>
        <div class="data-row"><span>LONGITUDE:</span> <span class="tel-val" id="tel-lon">--</span></div>
    </div>

    <div class="panel" id="ui-panel">
        <h2>🛰️ Pro Radar System</h2>
        <button id="installBtn">📲 Install Pro Radar App</button>
        <div id="controls"></div>
        <p id="status-text">System Initialization...</p>
        <p class="diagnostic" id="debug-log">Log: Standby</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyAQJgJN-zhFVLfHmb_nchilnl7P7EO_mxQ",
  authDomain: "device-tracker-f43d5.firebaseapp.com",
  databaseURL: "https://device-tracker-f43d5-default-rtdb.firebaseio.com",
  projectId: "device-tracker-f43d5",
  storageBucket: "device-tracker-f43d5.firebasestorage.app",
  messagingSenderId: "153076156970",
  appId: "1:153076156970:web:d2eeb8e66ddfd4f9f61153",
  measurementId: "G-EZHG4JEKT8"
};
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        const targetRoom = urlParams.get('target');
        
        const controls = document.getElementById('controls');
        const statusText = document.getElementById('status-text');
        const telemetryPanel = document.getElementById('telemetryPanel');
        const radarSweep = document.getElementById('radarSweep');
        
        const map = L.map('map', { zoomControl: false }).setView([18.5204, 73.8567], 3);
        const darkTheme = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' }).addTo(map);
        const satTheme = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri' });
        
        let isDark = true;
        window.toggleMap = function() {
            if (isDark) { map.removeLayer(darkTheme); satTheme.addTo(map); } 
            else { map.removeLayer(satTheme); darkTheme.addTo(map); }
            isDark = !isDark;
        };

        window.toggleRadar = function() {
            radarSweep.style.display = (radarSweep.style.display === 'block') ? 'none' : 'block';
        };

        window.focusISS = function() {
            if (issMarker) {
                map.flyTo(issMarker.getLatLng(), 5, { animate: true, duration: 2.0 });
                statusText.innerText = "🛰️ SPACE MODE ACTIVATED";
                statusText.style.color = "#f39c12"; 
                radarSweep.style.display = 'block';
                telemetryPanel.style.display = 'block';
            }
        };

        let issMarker;
        const issIcon = L.divIcon({ className: 'custom-icon', html: "<div style='font-size: 28px; filter: drop-shadow(0px 0px 8px #f39c12);'>🛰️</div>", iconSize: [30, 30], iconAnchor: [15, 15] });

        // REVERTED TO PUBLIC API TO FIX THE CRASH
        async function fetchISS() {
            try {
                const response = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const data = await response.json();
                
                if (issMarker) { issMarker.setLatLng([data.latitude, data.longitude]); } 
                else { issMarker = L.marker([data.latitude, data.longitude], {icon: issIcon}).addTo(map); }

                document.getElementById('tel-status').innerText = "OPTIMAL";
                document.getElementById('tel-status').style.color = "#2ecc71";
                document.getElementById('tel-vel').innerText = `${Math.round(data.velocity)} km/h`;
                document.getElementById('tel-alt').innerText = `${Math.round(data.altitude)} km`;
                document.getElementById('tel-lat').innerText = data.latitude.toFixed(4);
                document.getElementById('tel-lon').innerText = data.longitude.toFixed(4);
            } catch (error) { 
                document.getElementById('tel-status').innerText = "LINK FAILED";
                document.getElementById('tel-status').style.color = "#e74c3c";
            }
        }
        fetchISS(); setInterval(fetchISS, 3000);

        let squadMarkers = {}; let squadCircles = {};

        if (!targetRoom) {
            controls.innerHTML = `
                <button id="generateBtn">🔗 Create Secure Room</button>
                <div class="controls-row">
                    <button class="small-btn" onclick="toggleMap()">🌍 Map</button>
                    <button class="small-btn" onclick="toggleRadar()">📡 Sweep</button>
                    <button class="small-btn" onclick="focusISS()">🛰️ ISS Mode</button>
                </div>
                <div id="linkContainer" style="display:none;"><input type="text" id="shareLink" readonly onclick="this.select()"></div>
            `;
            
            document.getElementById('generateBtn').onclick = () => {
                const roomCode = Math.random().toString(36).substring(2, 8);
                const link = window.location.href.split('?')[0] + "?target=" + roomCode;
                document.getElementById('shareLink').value = link;
                document.getElementById('linkContainer').style.display = 'block';
                document.getElementById('generateBtn').style.display = 'none';
                
                statusText.innerText = "Waiting for Squad...";
                onValue(ref(db, 'tracking/' + roomCode), (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        statusText.innerText = `🎯 SQUAD MODE: ${Object.keys(data).length} ONLINE`;
                        const glowingBlip = L.divIcon({ className: 'custom-icon', html: "<div class='radar-blip'></div>", iconSize: [18, 18], iconAnchor: [9, 9] });

                        for (const [deviceId, targetData] of Object.entries(data)) {
                            if (targetData.lat != null && targetData.lon != null) {
                                const safeAcc = targetData.acc || 20;
                                if (squadMarkers[deviceId]) {
                                    squadMarkers[deviceId].setLatLng([targetData.lat, targetData.lon]);
                                    squadCircles[deviceId].setLatLng([targetData.lat, targetData.lon]);
                                    squadCircles[deviceId].setRadius(safeAcc);
                                } else {
                                    squadMarkers[deviceId] = L.marker([targetData.lat, targetData.lon], {icon: glowingBlip}).addTo(map);
                                    squadMarkers[deviceId].bindTooltip(targetData.name || "Unknown", { permanent: true, direction: 'top', className: 'custom-tooltip', offset: [0, -10] }).openTooltip();
                                    squadCircles[deviceId] = L.circle([targetData.lat, targetData.lon], { color: '#00C9FF', fillColor: '#00C9FF', fillOpacity: 0.1, radius: safeAcc }).addTo(map);
                                }
                            }
                        }
                    }
                });
            };
        } else {
            controls.innerHTML = `
                <input type="text" id="targetName" placeholder="Enter your name" autocomplete="off">
                <button id="shareBtn">📍 Broadcast Location</button>
            `;
            statusText.innerText = `Encrypted Channel Ready`;
            const myDeviceId = "device_" + Math.random().toString(36).substring(2, 9);
            
            document.getElementById('shareBtn').onclick = () => {
                const myName = document.getElementById('targetName').value.trim() || "Target";
                statusText.innerText = "Synchronizing GPS...";
                document.getElementById('shareBtn').style.display = 'none';
                document.getElementById('targetName').style.display = 'none';
                
                if (navigator.geolocation) {
                    navigator.geolocation.watchPosition((position) => {
                        const safeAcc = position.coords.accuracy || 20;
                        const myRef = ref(db, `tracking/${targetRoom}/${myDeviceId}`);
                        set(myRef, { name: myName, lat: position.coords.latitude, lon: position.coords.longitude, acc: safeAcc })
                        .then(() => { statusText.innerText = `🟢 TRANSMITTING AS: ${myName.toUpperCase()}`; });

                        onDisconnect(myRef).remove();
                        map.setView([position.coords.latitude, position.coords.longitude], 16);
                    }, (error) => {
                        statusText.innerText = "❌ GPS Signal Lost or Denied";
                    }, { enableHighAccuracy: true });
                } else {
                    statusText.innerText = "❌ GPS Not Supported";
                }
            };
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Failed', err)); });
        }
        let deferredPrompt; const installBtn = document.getElementById('installBtn');
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block'; });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt !== null) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
