<!DOCTYPE html>
<html>
<head>
    <title>Live Radar Pro - Squad Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0a0a0a; color: #ecf0f1; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        .panel { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; z-index: 1000; padding: 25px; border-radius: 24px; 
            background: rgba(15, 20, 25, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 201, 255, 0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center;
        }

        h2 { margin: 0 0 10px 0; font-size: 18px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: #00C9FF; }
        
        button { padding: 16px; border: none; border-radius: 14px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        #generateBtn { background: linear-gradient(90deg, #00C9FF 0%, #0072ff 100%); color: white; box-shadow: 0 4px 15px rgba(0, 201, 255, 0.4); }
        #shareBtn { background: linear-gradient(90deg, #ff416c 0%, #ff4b2b 100%); color: white; box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4); }
        
        input { padding: 14px; width: 85%; margin-top: 10px; margin-bottom: 5px; text-align: center; font-size: 14px; border-radius: 10px; border: 1px solid rgba(0, 201, 255, 0.3); background: rgba(0, 0, 0, 0.6); color: #00C9FF; outline: none; }
        input::placeholder { color: rgba(0, 201, 255, 0.4); }
        
        #status-text { color: #00C9FF; font-weight: bold; margin-top: 15px; font-size: 14px; letter-spacing: 1px;}
        .diagnostic { font-size: 11px; color: rgba(255, 255, 255, 0.4); margin-top: 10px; font-family: monospace; }

        .radar-blip { width: 18px; height: 18px; background-color: #00C9FF; border-radius: 50%; position: relative; box-shadow: 0 0 15px #00C9FF; }
        .radar-blip::after { content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px; border-radius: 50%; border: 2px solid #00C9FF; animation: pulse 1.5s ease-out infinite; opacity: 0; }
        @keyframes pulse { 0% { transform: scale(0.3); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* Cinematic Floating Name Tags */
        .leaflet-tooltip.custom-tooltip { background: rgba(15, 20, 25, 0.9); border: 1px solid #00C9FF; color: #00C9FF; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(0, 201, 255, 0.3); }
        .leaflet-tooltip-top:before { border-top-color: #00C9FF; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="panel" id="ui-panel">
        <h2>🛰️ Squad Radar</h2>
        <div id="controls"></div>
        <p id="status-text">System Initialization...</p>
        <p class="diagnostic" id="debug-log">Log: Standby</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        // PASTE YOUR FIREBASE CONFIG HERE:
        const firebaseConfig = {
  apiKey: "AIzaSyAQJgJN-zhFVLfHmb_nchilnl7P7EO_mxQ",
  authDomain: "device-tracker-f43d5.firebaseapp.com",
  databaseURL: "https://device-tracker-f43d5-default-rtdb.firebaseio.com",
  projectId: "device-tracker-f43d5",
  storageBucket: "device-tracker-f43d5.firebasestorage.app",
  messagingSenderId: "153076156970",
  appId: "1:153076156970:web:d2eeb8e66ddfd4f9f61153",
  measurementId: "G-EZHG4JEKT8"
}
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        const targetRoom = urlParams.get('target');
        
        const controls = document.getElementById('controls');
        const statusText = document.getElementById('status-text');
        const debugLog = document.getElementById('debug-log');
        
        const map = L.map('map', { zoomControl: false }).setView([18.5204, 73.8567], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' }).addTo(map);

        // Store multiple markers and circles for the squad
        let squadMarkers = {};
        let squadCircles = {};

        if (!targetRoom) {
            // ==========================================
            // MODE 1: RADAR COMMAND CENTER
            // ==========================================
            controls.innerHTML = `
                <button id="generateBtn">🔗 Generate Squad Link</button>
                <div id="linkContainer" style="display:none;">
                    <input type="text" id="shareLink" readonly onclick="this.select()">
                </div>
            `;
            
            document.getElementById('generateBtn').onclick = () => {
                const roomCode = Math.random().toString(36).substring(2, 8);
                const link = window.location.href.split('?')[0] + "?target=" + roomCode;
                
                document.getElementById('shareLink').value = link;
                document.getElementById('linkContainer').style.display = 'block';
                document.getElementById('generateBtn').style.display = 'none';
                
                navigator.clipboard.writeText(link).catch(e => console.log("Clipboard error"));
                
                statusText.innerText = "Waiting for Squad to Connect...";
                debugLog.innerText = `Log: Secure Room [${roomCode}]`;
                
                // Listen to the ENTIRE room folder now
                onValue(ref(db, 'tracking/' + roomCode), (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const squadSize = Object.keys(data).length;
                        statusText.innerText = `🎯 TRACKING ${squadSize} TARGET(S)`;
                        debugLog.innerText = `Log: Live Sync Active`;
                        
                        const glowingBlip = L.divIcon({
                            className: 'custom-icon', html: "<div class='radar-blip'></div>", iconSize: [18, 18], iconAnchor: [9, 9]
                        });

                        // Loop through everyone currently transmitting in this room
                        for (const [deviceId, targetData] of Object.entries(data)) {
                            if (squadMarkers[deviceId]) {
                                // Update existing friend's location
                                squadMarkers[deviceId].setLatLng([targetData.lat, targetData.lon]);
                                squadCircles[deviceId].setLatLng([targetData.lat, targetData.lon]);
                                squadCircles[deviceId].setRadius(targetData.acc);
                            } else {
                                // Draw a new friend who just joined
                                squadMarkers[deviceId] = L.marker([targetData.lat, targetData.lon], {icon: glowingBlip}).addTo(map);
                                
                                // Attach their custom Name Tag
                                squadMarkers[deviceId].bindTooltip(targetData.name, {
                                    permanent: true, direction: 'top', className: 'custom-tooltip', offset: [0, -10]
                                }).openTooltip();

                                squadCircles[deviceId] = L.circle([targetData.lat, targetData.lon], {
                                    color: '#00C9FF', fillColor: '#00C9FF', fillOpacity: 0.1, radius: targetData.acc
                                }).addTo(map);
                            }
                        }
                        
                        // Smart Camera: Auto-zoom to fit everyone on the screen!
                        const group = new L.featureGroup(Object.values(squadMarkers));
                        map.fitBounds(group.getBounds(), { padding: [50, 50], maxZoom: 17, animate: true });
                    }
                });
            };
        } else {
            // ==========================================
            // MODE 2: THE TARGET PHONE
            // ==========================================
            // Ask for their name before they start transmitting
            controls.innerHTML = `
                <input type="text" id="targetName" placeholder="Enter your name (e.g. Uday)" autocomplete="off">
                <button id="shareBtn">📍 Broadcast Location</button>
            `;
            statusText.innerText = `Encrypted Channel Ready`;
            debugLog.innerText = `Log: Node [${targetRoom}]`;
            
            // Give this specific phone a random secret ID so it doesn't overwrite others
            const myDeviceId = "device_" + Math.random().toString(36).substring(2, 9);
            
            document.getElementById('shareBtn').onclick = () => {
                const myName = document.getElementById('targetName').value.trim() || "Unknown Target";
                
                statusText.innerText = "Synchronizing GPS...";
                document.getElementById('shareBtn').style.display = 'none';
                document.getElementById('targetName').style.display = 'none';
                
                if (navigator.geolocation) {
                    navigator.geolocation.watchPosition((position) => {
                        debugLog.innerText = "Log: Broadcasting live data...";
                        
                        // Push to their unique device folder inside the room
                        const myRef = ref(db, `tracking/${targetRoom}/${myDeviceId}`);
                        set(myRef, { 
                            name: myName,
                            lat: position.coords.latitude, 
                            lon: position.coords.longitude,
                            acc: position.coords.accuracy 
                        }).then(() => {
                            statusText.innerText = `🟢 TRANSMITTING AS: ${myName.toUpperCase()}`;
                        });

                        // Automatically delete their pin from the map if they close the website
                        onDisconnect(myRef).remove();
                        
                        map.flyTo([position.coords.latitude, position.coords.longitude], 16, { animate: true });
                    }, (error) => {
                        statusText.innerText = "❌ GPS Signal Lost";
                    }, { enableHighAccuracy: true });
                }
            };
        }
    </script>
</body>
</html>
